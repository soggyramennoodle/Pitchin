<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pitchin Google Sheets Test</title>
  <style>
    body{font-family:Inter,Arial,sans-serif;margin:0;padding:32px;background:#fff;color:#1f2426}main{max-width:1100px;margin:0 auto}.hero{background:#1f514c;color:#fff;border-radius:24px;padding:28px;margin-bottom:20px}h1{margin:0;font-size:40px}input,select{padding:12px;border:1px solid #e8e3db;border-radius:12px;margin:0 8px 12px 0}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}.card{border:1px solid #e8e3db;border-radius:20px;padding:18px;box-shadow:0 12px 30px rgba(18,27,24,.08)}.tag{display:inline-block;background:#dfece7;color:#274740;border-radius:999px;padding:5px 10px;margin:4px 4px 8px 0;font-size:13px}.muted{color:#6f7674}.error{color:#9f1239;background:#fff1f2;border:1px solid #fecdd3;border-radius:16px;padding:16px}
  </style>
</head>
<body>
<main>
  <section class="hero"><h1>Pitchin Directory Test</h1><p>Live test page reading Published rows from Google Sheets.</p></section>
  <input id="q" placeholder="Search listings">
  <select id="city"><option value="">All cities</option></select>
  <select id="cat"><option value="">All categories</option></select>
  <p id="count" class="muted">Loading...</p>
  <section id="grid" class="grid"></section>
</main>
<script>
const API='https://script.google.com/macros/s/AKfycbyMOyPsde1QFaJnoAX5yXlXjEj8zYkKDOAuLFItcZmvWdz-YhlL8aKI0iSr4oyYT1mp/exec';
let rows=[];
const grid=document.getElementById('grid'),count=document.getElementById('count'),q=document.getElementById('q'),city=document.getElementById('city'),cat=document.getElementById('cat');
window.pitchinDirectoryData=data=>{rows=(Array.isArray(data)?data:[]).map(normalize);fillFilters();render();};
function normalize(x){return{title:t(x.title),organization:t(x.organization),category:t(x.category),city:t(x.city),province:t(x.province),format:t(x.format),commitmentType:t(x.commitmentType),timeCommitment:t(x.timeCommitment),studentFriendly:x.studentFriendly===true||x.studentFriendly==='TRUE'||x.studentFriendly==='true',deadline:t(x.applicationDeadline),link:t(x.applicationLink),email:t(x.email),description:t(x.description)}}
function t(v){return v==null?'':String(v).trim()}
function esc(s){return t(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function fillFilters(){for(const [sel,key] of [[city,'city'],[cat,'category']]){[...new Set(rows.map(r=>r[key]).filter(Boolean))].sort().forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;sel.appendChild(o);});}}
function render(){const query=q.value.toLowerCase();const visible=rows.filter(r=>(!query||[r.title,r.organization,r.description].join(' ').toLowerCase().includes(query))&&(!city.value||r.city===city.value)&&(!cat.value||r.category===cat.value));count.textContent=`${visible.length} of ${rows.length} opportunities`;grid.innerHTML=visible.map(r=>`<article class="card"><h2>${esc(r.title)}</h2><p><strong>${esc(r.organization)}</strong></p><p class="muted">${esc([r.city,r.province].filter(Boolean).join(', '))}</p><span class="tag">${esc(r.category)}</span><span class="tag">${esc(r.format)}</span><p>${esc(r.description).slice(0,220)}${r.description.length>220?'...':''}</p><p><strong>Deadline:</strong> ${esc(r.deadline||'Not listed')}</p><p><strong>Student friendly:</strong> ${r.studentFriendly?'Yes':'No'}</p>${r.link?`<p><a href="${esc(r.link)}" target="_blank" rel="noopener">Apply / Learn more</a></p>`:''}</article>`).join('')||'<p>No matching opportunities.</p>';}
[q,city,cat].forEach(el=>el.addEventListener('input',render));
function load(){const s=document.createElement('script');s.src=API+'?callback=pitchinDirectoryData&v='+Date.now();s.onerror=()=>{count.textContent='Load error';grid.innerHTML='<div class="error">Could not load data. Your Apps Script must support the callback parameter.</div>';};document.body.appendChild(s);}load();
</script>
</body>
</html>
