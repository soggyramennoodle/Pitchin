<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitchin | Newsroom Admin</title>
    <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="18" fill="%232E4036"/><path d="M49 15 15 29c-2 1-2 4 .2 4.7l10.1 3.1 3.1 10.1c.7 2.2 3.7 2.3 4.7.2L49 15Z" fill="%23F2F0E9"/></svg>'>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --moss:      #2E4036;
            --moss-deep: #1e2b24;
            --clay:      #CC5833;
            --clay-b:    #e0683f;
            --cream:     #F2F0E9;
            --paper:     #FBFAF6;
            --ink:       #1A1A1A;
            --ink-2:     #4a4a45;
            --ink-3:     #7a7a72;
            --line:      rgba(26,26,26,0.10);
            --line-soft: rgba(26,26,26,0.06);
            --sans:      'Plus Jakarta Sans', system-ui, sans-serif;
            --mono:      'IBM Plex Mono', monospace;
            --r:         14px;
        }
        body {
            font-family: var(--sans);
            background: var(--paper);
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* ── Gate ── */
        #gate {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        .gate-box {
            background: white;
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 8px 32px rgba(26,26,26,0.08);
        }
        .gate-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 28px;
        }
        .gate-logo svg { width: 28px; height: 28px; }
        .gate-logo span { font-weight: 800; font-size: 18px; color: var(--moss); }
        .gate-box h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
        .gate-box p { font-size: 14px; color: var(--ink-2); margin-bottom: 24px; }
        .gate-error { color: #c0392b; font-size: 13px; margin-top: 10px; display: none; }

        /* ── App ── */
        #app { display: none; }

        .topbar {
            background: var(--moss);
            color: var(--cream);
            padding: 0 32px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .topbar-brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; }
        .topbar-brand svg { width: 20px; height: 20px; }
        .topbar-right { display: flex; align-items: center; gap: 16px; }
        .topbar-link { font-size: 13px; color: rgba(242,240,233,0.7); text-decoration: none; transition: color .15s; }
        .topbar-link:hover { color: var(--cream); }
        .topbar-badge { font-family: var(--mono); font-size: 11px; background: rgba(242,240,233,0.12); color: var(--cream); padding: 3px 8px; border-radius: 6px; }

        .layout {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 32px 80px;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 40px;
            align-items: start;
        }

        /* ── Form panel ── */
        .panel {
            background: white;
            border: 1px solid var(--line);
            border-radius: 20px;
            overflow: hidden;
        }
        .panel-head {
            padding: 24px 28px 20px;
            border-bottom: 1px solid var(--line-soft);
        }
        .panel-head h2 { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
        .panel-head p { font-size: 13px; color: var(--ink-3); }
        .panel-body { padding: 28px; }

        .field { margin-bottom: 20px; }
        .field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--ink-2);
            margin-bottom: 7px;
        }
        .field label .req { color: var(--clay); margin-left: 2px; }
        .field label .hint { font-weight: 400; color: var(--ink-3); margin-left: 6px; }
        .field input,
        .field textarea,
        .field select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--line);
            border-radius: 10px;
            font-size: 14px;
            color: var(--ink);
            background: var(--paper);
            transition: border-color .15s;
            outline: none;
        }
        .field input:focus,
        .field textarea:focus,
        .field select:focus { border-color: var(--moss); background: white; }
        .field textarea { resize: vertical; min-height: 90px; line-height: 1.55; }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .field-row .field { margin-bottom: 0; }

        .img-preview-wrap { margin-top: 10px; display: none; }
        .img-preview-wrap img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid var(--line);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 11px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: background .15s, transform .1s;
        }
        .btn:active { transform: scale(0.97); }
        .btn--primary { background: var(--moss); color: var(--cream); flex: 1; justify-content: center; }
        .btn--primary:hover { background: var(--moss-deep, #1e2b24); }
        .btn--ghost { background: transparent; color: var(--ink-2); border: 1.5px solid var(--line); }
        .btn--ghost:hover { background: var(--line-soft, rgba(26,26,26,0.06)); }
        .btn--danger-ghost { background: transparent; color: #c0392b; border: 1.5px solid rgba(192,57,43,0.25); font-size: 13px; padding: 8px 14px; }
        .btn--danger-ghost:hover { background: rgba(192,57,43,0.06); }

        /* ── Posts list ── */
        .posts-panel .panel-head { display: flex; align-items: center; justify-content: space-between; }
        .post-count { font-family: var(--mono); font-size: 11px; background: var(--moss); color: var(--cream); padding: 3px 9px; border-radius: 20px; }
        .post-list { padding: 16px; display: flex; flex-direction: column; gap: 10px; }

        .post-item {
            border: 1.5px solid var(--line);
            border-radius: 14px;
            overflow: hidden;
            background: var(--paper);
            transition: border-color .15s;
        }
        .post-item:hover { border-color: rgba(46,64,54,0.25); }
        .post-item--featured { border-color: var(--clay); background: rgba(204,88,51,0.03); }

        .post-item-inner { display: flex; gap: 0; }
        .post-item-img {
            width: 72px;
            min-height: 72px;
            object-fit: cover;
            flex-shrink: 0;
        }
        .post-item-img-placeholder {
            width: 72px;
            min-height: 72px;
            background: var(--line-soft, rgba(26,26,26,0.06));
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: var(--ink-3);
            font-size: 22px;
        }
        .post-item-info { padding: 12px 14px; flex: 1; min-width: 0; }
        .post-item-top { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
        .post-item-city { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .post-item-tag { font-size: 11px; font-family: var(--mono); color: var(--clay); background: var(--clay-soft, rgba(204,88,51,0.10)); padding: 2px 7px; border-radius: 6px; white-space: nowrap; }
        .featured-pill { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--clay); background: rgba(204,88,51,0.12); padding: 2px 7px; border-radius: 6px; }
        .post-item-date { font-size: 12px; color: var(--ink-3); font-family: var(--mono); margin-bottom: 4px; }
        .post-item-excerpt { font-size: 12px; color: var(--ink-2); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .post-item-actions { display: flex; gap: 6px; padding: 8px 14px 12px; justify-content: flex-end; }

        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: var(--ink-3);
            font-size: 14px;
        }
        .empty-state svg { display: block; margin: 0 auto 12px; opacity: .35; }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--moss);
            color: var(--cream);
            font-size: 14px;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(26,26,26,0.18);
            opacity: 0;
            transition: opacity .2s, transform .2s;
            pointer-events: none;
            z-index: 999;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (max-width: 820px) {
            .layout { grid-template-columns: 1fr; padding: 24px 20px 60px; }
        }
    </style>
</head>
<body>

<!-- ── Password Gate ── -->
<div id="gate">
    <div class="gate-box">
        <div class="gate-logo">
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="64" height="64" rx="18" fill="#2E4036"/>
                <path d="M49 15 15 29c-2 1-2 4 .2 4.7l10.1 3.1 3.1 10.1c.7 2.2 3.7 2.3 4.7.2L49 15Z" fill="#F2F0E9"/>
            </svg>
            <span>Pitchin</span>
        </div>
        <h1>Newsroom Admin</h1>
        <p>Enter your password to manage dispatch posts.</p>
        <div class="field">
            <label for="pw">Password</label>
            <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn btn--primary" style="width:100%;justify-content:center;" onclick="checkPassword()">
            Enter
        </button>
        <p class="gate-error" id="gate-error">Incorrect password. Try again.</p>
    </div>
</div>

<!-- ── App ── -->
<div id="app">
    <div class="topbar">
        <div class="topbar-brand">
            <svg viewBox="0 0 64 64" fill="none"><rect width="64" height="64" rx="18" fill="#2E4036"/><path d="M49 15 15 29c-2 1-2 4 .2 4.7l10.1 3.1 3.1 10.1c.7 2.2 3.7 2.3 4.7.2L49 15Z" fill="#F2F0E9"/></svg>
            Newsroom Admin
        </div>
        <div class="topbar-right">
            <span class="topbar-badge" id="topbarCount">0 posts</span>
            <a href="/newsroom/" class="topbar-link">View live newsroom →</a>
        </div>
    </div>

    <div class="layout">
        <!-- Form -->
        <div>
            <div class="panel" id="formPanel">
                <div class="panel-head">
                    <h2 id="formTitle">Add New Dispatch Post</h2>
                    <p id="formSubtitle">New posts become the featured hero. Previous hero moves to the grid.</p>
                </div>
                <div class="panel-body">
                    <input type="hidden" id="editId">

                    <div class="field-row">
                        <div class="field">
                            <label for="fCity">City Name <span class="req">*</span></label>
                            <input type="text" id="fCity" placeholder="e.g. Edmonton">
                        </div>
                        <div class="field">
                            <label for="fProvince">Province/Sub-title <span class="req">*</span></label>
                            <input type="text" id="fProvince" placeholder="e.g. Alberta · 5th city">
                        </div>
                    </div>

                    <div class="field-row">
                        <div class="field">
                            <label for="fTag">Tag <span class="req">*</span></label>
                            <input type="text" id="fTag" placeholder="e.g. City Launch">
                        </div>
                        <div class="field">
                            <label for="fDate">Date <span class="req">*</span></label>
                            <input type="date" id="fDate">
                        </div>
                    </div>

                    <div class="field-row">
                        <div class="field">
                            <label for="fLat">Latitude coords <span class="hint">(for card display)</span></label>
                            <input type="text" id="fLat" placeholder="e.g. 53.55° N">
                        </div>
                        <div class="field">
                            <label for="fLng">Longitude coords</label>
                            <input type="text" id="fLng" placeholder="e.g. 113.49° W">
                        </div>
                    </div>

                    <div class="field">
                        <label for="fExcerpt">Description / Excerpt <span class="req">*</span></label>
                        <textarea id="fExcerpt" placeholder="2–3 sentences about this city launch or news post…"></textarea>
                    </div>

                    <div class="field">
                        <label for="fImg">Image URL <span class="req">*</span></label>
                        <input type="url" id="fImg" placeholder="https://…" oninput="previewImg(this.value)">
                        <div class="img-preview-wrap" id="imgPreviewWrap">
                            <img id="imgPreview" src="" alt="Preview">
                        </div>
                    </div>

                    <div class="field">
                        <label for="fLink">Browse link <span class="hint">(defaults to /directory/)</span></label>
                        <input type="text" id="fLink" placeholder="/directory/">
                    </div>

                    <div class="form-actions">
                        <button class="btn btn--ghost" type="button" onclick="resetForm()">Cancel</button>
                        <button class="btn btn--primary" type="button" onclick="savePost()">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            <span id="saveBtnLabel">Publish Post</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Post list -->
        <div class="posts-panel">
            <div class="panel">
                <div class="panel-head">
                    <div>
                        <h2>All Posts</h2>
                        <p style="font-size:13px;color:var(--ink-3);margin-top:2px">First post = hero. Rest = grid.</p>
                    </div>
                    <span class="post-count" id="postCount">0</span>
                </div>
                <div class="post-list" id="postList"></div>
            </div>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
const STORAGE_KEY = 'pitchin_dispatch_posts';
const PASSWORD    = 'pitchin2026'; // ← change this

/* ── Auth ── */
function checkPassword() {
    const val = document.getElementById('pw').value;
    if (val === PASSWORD) {
        document.getElementById('gate').style.display = 'none';
        document.getElementById('app').style.display  = 'block';
        renderPostList();
    } else {
        document.getElementById('gate-error').style.display = 'block';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
    }
}
document.getElementById('pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
});

/* ── Storage helpers ── */
function getPosts() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
}
function savePosts(posts) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
}

/* ── Image preview ── */
function previewImg(url) {
    const wrap = document.getElementById('imgPreviewWrap');
    const img  = document.getElementById('imgPreview');
    if (url && url.startsWith('http')) {
        img.src = url;
        wrap.style.display = 'block';
    } else {
        wrap.style.display = 'none';
    }
}

/* ── Save / edit ── */
function savePost() {
    const city     = document.getElementById('fCity').value.trim();
    const province = document.getElementById('fProvince').value.trim();
    const tag      = document.getElementById('fTag').value.trim();
    const dateVal  = document.getElementById('fDate').value;
    const excerpt  = document.getElementById('fExcerpt').value.trim();
    const img      = document.getElementById('fImg').value.trim();
    const lat      = document.getElementById('fLat').value.trim();
    const lng      = document.getElementById('fLng').value.trim();
    const link     = document.getElementById('fLink').value.trim() || '/directory/';
    const editId   = document.getElementById('editId').value;

    if (!city || !province || !tag || !dateVal || !excerpt || !img) {
        toast('Fill in all required fields.', true); return;
    }

    const dateObj    = new Date(dateVal + 'T12:00:00');
    const dateLabel  = dateObj.toLocaleDateString('en-CA', { month:'long', day:'numeric', year:'numeric' });
    const coords     = (lat && lng) ? `${lat} · ${lng}` : '';
    const heroCoords = (lat && lng) ? `${lat}<br>${lng}` : '';

    const post = { id: editId || Date.now().toString(), city, province, tag, date: dateVal, dateLabel, excerpt, img, lat, lng, coords, heroCoords, link };

    let posts = getPosts();
    if (editId) {
        const idx = posts.findIndex(p => p.id === editId);
        if (idx !== -1) posts[idx] = post; else posts.unshift(post);
    } else {
        posts.unshift(post); // new post goes to top → becomes hero
    }
    savePosts(posts);
    renderPostList();
    resetForm();
    toast(editId ? 'Post updated.' : 'Post published — now the hero!');
}

/* ── Edit ── */
function editPost(id) {
    const post = getPosts().find(p => p.id === id);
    if (!post) return;
    document.getElementById('editId').value   = id;
    document.getElementById('fCity').value    = post.city;
    document.getElementById('fProvince').value= post.province;
    document.getElementById('fTag').value     = post.tag;
    document.getElementById('fDate').value    = post.date;
    document.getElementById('fExcerpt').value = post.excerpt;
    document.getElementById('fImg').value     = post.img;
    document.getElementById('fLat').value     = post.lat || '';
    document.getElementById('fLng').value     = post.lng || '';
    document.getElementById('fLink').value    = post.link || '/directory/';
    previewImg(post.img);
    document.getElementById('formTitle').textContent    = 'Edit Post';
    document.getElementById('formSubtitle').textContent = 'Editing existing post — changes save in place.';
    document.getElementById('saveBtnLabel').textContent = 'Save Changes';
    document.getElementById('formPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ── Delete ── */
function deletePost(id) {
    if (!confirm('Delete this post? This cannot be undone.')) return;
    const posts = getPosts().filter(p => p.id !== id);
    savePosts(posts);
    renderPostList();
    toast('Post deleted.');
}

/* ── Reorder ── */
function movePost(id, dir) {
    const posts = getPosts();
    const idx   = posts.findIndex(p => p.id === id);
    const swap  = idx + dir;
    if (swap < 0 || swap >= posts.length) return;
    [posts[idx], posts[swap]] = [posts[swap], posts[idx]];
    savePosts(posts);
    renderPostList();
}

/* ── Reset form ── */
function resetForm() {
    ['fCity','fProvince','fTag','fDate','fExcerpt','fImg','fLat','fLng','fLink','editId'].forEach(id => {
        document.getElementById(id).value = '';
    });
    document.getElementById('imgPreviewWrap').style.display = 'none';
    document.getElementById('formTitle').textContent    = 'Add New Dispatch Post';
    document.getElementById('formSubtitle').textContent = 'New posts become the featured hero. Previous hero moves to the grid.';
    document.getElementById('saveBtnLabel').textContent = 'Publish Post';
}

/* ── Render post list ── */
function renderPostList() {
    const posts = getPosts();
    const list  = document.getElementById('postList');
    document.getElementById('postCount').textContent   = posts.length;
    document.getElementById('topbarCount').textContent = posts.length + (posts.length === 1 ? ' post' : ' posts');

    if (!posts.length) {
        list.innerHTML = `<div class="empty-state">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="4" stroke="currentColor" stroke-width="1.5"/><path d="M7 8h10M7 12h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            No posts yet. Add your first dispatch above.
        </div>`;
        return;
    }

    list.innerHTML = posts.map((p, i) => {
        const isHero = i === 0;
        const imgEl  = p.img
            ? `<img class="post-item-img" src="${escHtml(p.img)}" alt="">`
            : `<div class="post-item-img-placeholder">🏙</div>`;
        return `
        <div class="post-item ${isHero ? 'post-item--featured' : ''}" data-id="${p.id}">
            <div class="post-item-inner">
                ${imgEl}
                <div class="post-item-info">
                    <div class="post-item-top">
                        <span class="post-item-city">${escHtml(p.city)}</span>
                        <span class="post-item-tag">${escHtml(p.tag)}</span>
                        ${isHero ? '<span class="featured-pill">Hero</span>' : ''}
                    </div>
                    <div class="post-item-date">${escHtml(p.dateLabel)}</div>
                    <div class="post-item-excerpt">${escHtml(p.excerpt)}</div>
                </div>
            </div>
            <div class="post-item-actions">
                ${i > 0 ? `<button class="btn btn--ghost" style="padding:6px 10px;font-size:12px;" onclick="movePost('${p.id}',-1)" title="Move up">↑</button>` : ''}
                ${i < posts.length-1 ? `<button class="btn btn--ghost" style="padding:6px 10px;font-size:12px;" onclick="movePost('${p.id}',1)" title="Move down">↓</button>` : ''}
                <button class="btn btn--ghost" style="font-size:13px;padding:7px 12px;" onclick="editPost('${p.id}')">Edit</button>
                <button class="btn btn--danger-ghost" onclick="deletePost('${p.id}')">Delete</button>
            </div>
        </div>`;
    }).join('');
}

function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Toast ── */
function toast(msg, isError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.background = isError ? '#c0392b' : 'var(--moss)';
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2800);
}
</script>
</body>
</html>
