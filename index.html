<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitchin | Volunteer Opportunities</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2D6A4F;
            --primary-hover: #1B4332;
            --bg-color: #FAFAFA;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
            --tag-bg: #DEF7EC;
            --tag-text: #03543F;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius-md: 12px;
            --radius-sm: 8px;
            --radius-full: 9999px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            background-color: var(--primary);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 500;
            color: var(--text-main);
            letter-spacing: -0.5px;
            font-family: 'Playfair Display', serif;
        }

        /* Hero Section */
        .hero-container {
            padding: 20px 20px 0;
            margin-bottom: 20px;
        }
        .hero {
            background-color: var(--primary);
            border-radius: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
            min-height: 480px;
            align-items: center;
        }
        .hero-content {
            padding: 60px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 24px;
            opacity: 0.9;
        }
        .hero-title {
            font-size: 54px;
            font-family: 'Playfair Display', serif;
            line-height: 1.1;
            margin-bottom: 24px;
            font-weight: 500;
        }
        .hero-desc {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 40px;
            opacity: 0.9;
            max-width: 90%;
        }
        .hero-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background-color: white;
            color: var(--text-main);
            padding: 10px 10px 10px 20px;
            border-radius: var(--radius-full);
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            width: fit-content;
            transition: transform 0.2s;
        }
        .hero-btn:hover {
            transform: scale(1.02);
        }
        .hero-btn-icon {
            background-color: var(--primary);
            color: white;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero-image {
            padding: 20px;
            height: 100%;
        }
        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }

        /* Filters Section */
        .filters-section {
            padding: 30px 0;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 16px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-group label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .filter-control {
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 14px;
            color: var(--text-main);
            background-color: var(--card-bg);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .filter-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.1);
        }

        /* Grid Layout */
        .opportunities-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 60px;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            grid-column: 1 / -1;
            font-size: 16px;
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            background: var(--card-bg);
            border-radius: var(--radius-md);
            border: 1px dashed var(--border-color);
            grid-column: 1 / -1;
            color: var(--text-muted);
        }

        /* Card */
        .card {
            background-color: var(--card-bg);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            padding: 24px;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: #d1d5db;
        }

        .card-header {
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .card-org {
            font-size: 14px;
            font-weight: 500;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-location {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tag {
            padding: 4px 10px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 500;
            background-color: var(--tag-bg);
            color: var(--tag-text);
            display: inline-block;
        }

        .tag.format {
            background-color: #F3F4F6;
            color: #4B5563;
        }

        .card-footer {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-muted);
        }

        .footer-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .footer-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9CA3AF;
        }

        .footer-val {
            font-weight: 500;
            color: var(--text-main);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background-color: var(--card-bg);
            border-radius: var(--radius-md);
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
            line-height: 1;
            padding: 4px;
            border-radius: 4px;
        }

        .modal-close:hover {
            color: var(--text-main);
            background-color: #F3F4F6;
        }

        .modal-content {
            padding: 32px;
        }

        .modal-header {
            margin-bottom: 24px;
            padding-right: 24px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .modal-meta-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px;
            padding: 16px;
            background-color: #F9FAFB;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
        }

        .modal-meta-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .modal-section {
            margin-bottom: 24px;
        }

        .modal-section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-main);
        }

        .modal-desc {
            color: var(--text-muted);
            white-space: pre-wrap;
            font-size: 15px;
            line-height: 1.6;
        }

        .apply-btn {
            display: block;
            width: 100%;
            padding: 14px 24px;
            background-color: var(--primary);
            color: white;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            border-radius: var(--radius-sm);
            transition: background-color 0.2s;
            border: none;
            cursor: pointer;
        }

        .apply-btn:hover {
            background-color: var(--primary-hover);
        }

        /* Responsive */
        @media (max-width: 992px) {
            .opportunities-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .filters-grid {
                grid-template-columns: 1fr 1fr;
            }
            .hero {
                grid-template-columns: 1fr;
            }
            .hero-image {
                padding: 0 20px 20px 20px;
            }
        }

        @media (max-width: 640px) {
            .opportunities-grid {
                grid-template-columns: 1fr;
            }
            .filters-grid {
                grid-template-columns: 1fr;
            }
            .modal-content {
                padding: 24px;
            }
            .modal-meta-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="container header-content">
            <a href="#" class="logo">
                <div class="logo-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </div>
                <span class="logo-text">Pitchin</span>
            </a>
        </div>
    </header>

    <div class="container hero-container">
        <div class="hero">
            <div class="hero-content">
                <div class="hero-badge">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    Directory is in early stages of development.
                </div>
                <h1 class="hero-title">Find volunteer<br>opportunities across<br>Canada.</h1>
                <p class="hero-desc">Pitchin is a free, searchable directory of verified, available volunteer opportunities for students and community members, without the noise.</p>
                <a href="#grid" class="hero-btn">
                    Browse Opportunities
                    <div class="hero-btn-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
                    </div>
                </a>
            </div>
            <div class="hero-image">
                <img src="https://images.pexels.com/photos/6995201/pexels-photo-6995201.jpeg?auto=compress&cs=tinysrgb&w=800" alt="Volunteers packing groceries" onerror="this.src='https://placehold.co/600x400/2D6A4F/FFF?text=Volunteer'">
            </div>
        </div>
    </div>

    <div class="filters-section">
        <div class="container">
            <div class="filters-grid">
                <div class="filter-group">
                    <label for="search">Search</label>
                    <input type="text" id="search" class="filter-control" placeholder="Search title or organization...">
                </div>
                <div class="filter-group">
                    <label for="category">Category</label>
                    <select id="category" class="filter-control">
                        <option value="">All Categories</option>
                        <!-- Options generated by JS -->
                    </select>
                </div>
                <div class="filter-group">
                    <label for="province">Province</label>
                    <select id="province" class="filter-control">
                        <option value="">All Provinces</option>
                        <!-- Options generated by JS -->
                    </select>
                </div>
                <div class="filter-group">
                    <label for="format">Format</label>
                    <select id="format" class="filter-control">
                        <option value="">All Formats</option>
                        <option value="In-person">In-person</option>
                        <option value="Remote">Remote</option>
                        <option value="Hybrid">Hybrid</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <main class="container">
        <div id="grid" class="opportunities-grid">
            <div class="loading">Loading opportunities...</div>
        </div>
    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <button class="modal-close" id="modalClose">&times;</button>
            <div class="modal-content" id="modalContent">
                <!-- Content generated dynamically -->
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        // REPLACE THESE WITH YOUR ACTUAL AIRTABLE CREDENTIALS
        const AIRTABLE_BASE_ID = 'appjyvV00uXnhlK24';
        const AIRTABLE_TOKEN = 'patDiR5tzj1IjBNvP.e455c6390b0b18825637770ae3bebb60eee9aa9f19a619bea938b168d787cadd';
        const TABLE_NAME = 'tblhV2mJc83wp5dgG';
        
        // Use true to test UI with fake data, change to false to connect to Airtable
        const USE_MOCK_DATA = false; 

        // --- STATE ---
        let allOpportunities = [];
        let filteredOpportunities = [];

        // DOM Elements
        const gridEl = document.getElementById('grid');
        const searchInput = document.getElementById('search');
        const categorySelect = document.getElementById('category');
        const provinceSelect = document.getElementById('province');
        const formatSelect = document.getElementById('format');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalCloseBtn = document.getElementById('modalClose');
        const modalContent = document.getElementById('modalContent');

        // --- MOCK DATA FOR TESTING ---
        const mockData = [
            {
                id: 'rec1',
                fields: {
                    "Opportunity Title": "Food Bank Assistant",
                    "Organization": "Daily Bread Food Bank",
                    "City": "Toronto",
                    "Province": "ON",
                    "Category": "Community Service",
                    "Format": "In-person",
                    "Commitment Type": "Weekly",
                    "Age Requirement": "16+",
                    "Hours Per Week": 4,
                    "Application Deadline": "2024-12-31",
                    "Description": "Help sort and pack food donations for distribution to local families in need. You will work as part of a team in our main warehouse. Physical lifting (up to 20lbs) may be required.",
                    "Application Link": "https://example.com/apply",
                    "Status": "Published"
                }
            },
            {
                id: 'rec2',
                fields: {
                    "Opportunity Title": "Virtual Math Tutor",
                    "Organization": "Youth Learning Initiative",
                    "City": "Vancouver",
                    "Province": "BC",
                    "Category": "Education",
                    "Format": "Remote",
                    "Commitment Type": "Flexible",
                    "Age Requirement": "18+",
                    "Hours Per Week": 2,
                    "Application Deadline": "2024-10-15",
                    "Description": "Provide one-on-one math tutoring to high school students via Zoom. Strong math skills required. Training provided.",
                    "Application Link": "https://example.com/apply",
                    "Status": "Published"
                }
            },
            {
                id: 'rec3',
                fields: {
                    "Opportunity Title": "Park Cleanup Crew",
                    "Organization": "Green Earth Helpers",
                    "City": "Calgary",
                    "Province": "AB",
                    "Category": "Environment",
                    "Format": "In-person",
                    "Commitment Type": "One-time",
                    "Age Requirement": "All Ages",
                    "Hours Per Week": 3,
                    "Application Deadline": "2024-09-01",
                    "Description": "Join our weekend cleanup event at Fish Creek Provincial Park. Bags, gloves, and refreshments will be provided.",
                    "Application Link": "https://example.com/apply",
                    "Status": "Published"
                }
            }
        ];

        // --- INITIALIZATION ---
        async function init() {
            if (USE_MOCK_DATA) {
                allOpportunities = mockData;
                setupFilters();
                renderCards(allOpportunities);
            } else {
                await fetchAirtableData();
            }

            // Event Listeners
            searchInput.addEventListener('input', applyFilters);
            categorySelect.addEventListener('change', applyFilters);
            provinceSelect.addEventListener('change', applyFilters);
            formatSelect.addEventListener('change', applyFilters);

            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) closeModal();
            });
            modalCloseBtn.addEventListener('click', closeModal);
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modalOverlay.classList.contains('active')) closeModal();
            });
        }

        // --- DATA FETCHING ---
        async function fetchAirtableData() {
            if (AIRTABLE_BASE_ID === 'YOUR_BASE_ID' || AIRTABLE_TOKEN === 'YOUR_PERSONAL_ACCESS_TOKEN') {
                gridEl.innerHTML = \`
                    <div class="no-results" style="border-color: #ef4444; color: #ef4444;">
                        <h3>Configuration Error</h3>
                        <p>Please update AIRTABLE_BASE_ID and AIRTABLE_TOKEN in the source code.</p>
                        <p style="margin-top:10px; font-size:14px; color:var(--text-muted)">Currently viewing mock data as fallback.</p>
                    </div>
                \`;
                allOpportunities = mockData;
                setupFilters();
                setTimeout(() => renderCards(allOpportunities), 2000);
                return;
            }

            gridEl.innerHTML = '<div class="loading">Loading opportunities from Airtable...</div>';

            try {
                const targetUrl = \`https://api.airtable.com/v0/\${AIRTABLE_BASE_ID}/\${encodeURIComponent(TABLE_NAME)}?filterByFormula=Status%3D'Published'\`;
                const url = new URL(\`https://corsproxy.io/?\${encodeURIComponent(targetUrl)}\`);
                
                // Note: Airtable paginates responses. For a full app, you'd handle the 'offset' token.
                // This fetches the first 100 records.
                const response = await fetch(url, {
                    headers: {
                        'Authorization': \`Bearer \${AIRTABLE_TOKEN}\`
                    }
                });

                if (!response.ok) {
                    throw new Error(\`Airtable API error: \${response.status}\`);
                }

                const data = await response.json();
                allOpportunities = data.records;
                filteredOpportunities = [...allOpportunities];
                
                setupFilters();
                renderCards(filteredOpportunities);

            } catch (error) {
                console.error("Error fetching data:", error);
                gridEl.innerHTML = \`
                    <div class="no-results">
                        <h3>Error loading data</h3>
                        <p>Could not fetch from Airtable. Check console for details.</p>
                    </div>
                \`;
            }
        }

        // --- FILTERING LOGIC ---
        function setupFilters() {
            const categories = new Set();
            const provinces = new Set();

            allOpportunities.forEach(opp => {
                const fields = opp.fields;
                if (fields["Category"]) categories.add(fields["Category"]);
                if (fields["Province"]) provinces.add(fields["Province"]);
            });

            // Populate Category Select
            Array.from(categories).sort().forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                categorySelect.appendChild(option);
            });

            // Populate Province Select
            Array.from(provinces).sort().forEach(prov => {
                const option = document.createElement('option');
                option.value = prov;
                option.textContent = prov;
                provinceSelect.appendChild(option);
            });
        }

        function applyFilters() {
            const searchTerm = searchInput.value.toLowerCase();
            const selectedCategory = categorySelect.value;
            const selectedProvince = provinceSelect.value;
            const selectedFormat = formatSelect.value;

            filteredOpportunities = allOpportunities.filter(opp => {
                const fields = opp.fields;
                
                const title = (fields["Opportunity Title"] || '').toLowerCase();
                const org = (fields["Organization"] || '').toLowerCase();
                const matchesSearch = title.includes(searchTerm) || org.includes(searchTerm);
                
                const matchesCategory = selectedCategory === '' || fields["Category"] === selectedCategory;
                const matchesProvince = selectedProvince === '' || fields["Province"] === selectedProvince;
                const matchesFormat = selectedFormat === '' || fields["Format"] === selectedFormat;

                return matchesSearch && matchesCategory && matchesProvince && matchesFormat;
            });

            renderCards(filteredOpportunities);
        }

        // --- RENDERING ---
        function renderCards(opportunities) {
            gridEl.innerHTML = '';

            if (opportunities.length === 0) {
                gridEl.innerHTML = \`
                    <div class="no-results">
                        <h3>No opportunities found</h3>
                        <p>Try adjusting your filters or search term.</p>
                    </div>
                \`;
                return;
            }

            opportunities.forEach(opp => {
                const fields = opp.fields;
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openModal(opp);

                // Safe field getters
                const title = fields["Opportunity Title"] || 'Untitled Opportunity';
                const org = fields["Organization"] || 'Unknown Organization';
                const city = fields["City"] || '';
                const prov = fields["Province"] || '';
                const location = [city, prov].filter(Boolean).join(', ') || 'Location not specified';
                const category = fields["Category"] || '';
                const format = fields["Format"] || '';
                const commitment = fields["Commitment Type"] || 'N/A';
                const age = fields["Age Requirement"] || 'N/A';

                card.innerHTML = \`
                    <div class="card-header">
                        <div class="card-title">\${title}</div>
                        <div class="card-org">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16M9 21v-4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v4"/></svg>
                            \${org}
                        </div>
                        <div class="card-location">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                            \${location}
                        </div>
                    </div>
                    <div class="card-tags">
                        \${category ? \`<span class="tag">\${category}</span>\` : ''}
                        \${format ? \`<span class="tag format">\${format}</span>\` : ''}
                    </div>
                    <div class="card-footer">
                        <div class="footer-item">
                            <span class="footer-label">Commitment</span>
                            <span class="footer-val">\${commitment}</span>
                        </div>
                        <div class="footer-item" style="text-align: right;">
                            <span class="footer-label">Age</span>
                            <span class="footer-val">\${age}</span>
                        </div>
                    </div>
                \`;
                gridEl.appendChild(card);
            });
        }

        // --- MODAL LOGIC ---
        function openModal(opportunity) {
            const fields = opportunity.fields;
            
            const title = fields["Opportunity Title"] || 'Untitled Opportunity';
            const org = fields["Organization"] || 'Unknown Organization';
            const city = fields["City"] || '';
            const prov = fields["Province"] || '';
            const location = [city, prov].filter(Boolean).join(', ') || 'Location not specified';
            const category = fields["Category"] || '';
            const format = fields["Format"] || '';
            const commitment = fields["Commitment Type"] || 'N/A';
            const age = fields["Age Requirement"] || 'N/A';
            const hours = fields["Hours Per Week"] ? \`\${fields["Hours Per Week"]} hrs/week\` : 'N/A';
            
            let deadlineStr = 'No deadline';
            if (fields["Application Deadline"]) {
                const date = new Date(fields["Application Deadline"]);
                deadlineStr = isNaN(date.getTime()) ? fields["Application Deadline"] : date.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
            }

            const desc = fields["Description"] || 'No description provided.';
            const applyLink = fields["Application Link"] || '#';

            modalContent.innerHTML = \`
                <div class="modal-header">
                    <h2 class="modal-title">\${title}</h2>
                    <div class="card-org" style="font-size: 16px; margin-bottom: 8px;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16M9 21v-4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v4"/></svg>
                        \${org}
                    </div>
                    <div class="card-location" style="font-size: 14px;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                        \${location}
                    </div>
                    <div class="card-tags" style="margin-top: 16px;">
                        \${category ? \`<span class="tag">\${category}</span>\` : ''}
                        \${format ? \`<span class="tag format">\${format}</span>\` : ''}
                    </div>
                </div>

                <div class="modal-meta-grid">
                    <div class="modal-meta-item">
                        <span class="footer-label">Commitment Type</span>
                        <span class="footer-val">\${commitment}</span>
                    </div>
                    <div class="modal-meta-item">
                        <span class="footer-label">Hours Per Week</span>
                        <span class="footer-val">\${hours}</span>
                    </div>
                    <div class="modal-meta-item">
                        <span class="footer-label">Age Requirement</span>
                        <span class="footer-val">\${age}</span>
                    </div>
                    <div class="modal-meta-item">
                        <span class="footer-label">Application Deadline</span>
                        <span class="footer-val">\${deadlineStr}</span>
                    </div>
                </div>

                <div class="modal-section">
                    <h3 class="modal-section-title">About the Role</h3>
                    <div class="modal-desc">\${desc}</div>
                </div>

                \${applyLink !== '#' ? \`
                    <a href="\${applyLink}" target="_blank" rel="noopener noreferrer" class="apply-btn">
                        Apply Now
                    </a>
                \` : \`
                    <div class="no-results" style="padding: 20px;">No application link available.</div>
                \`}
            \`;

            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevent background scrolling
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Start App
        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
